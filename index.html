<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MED&QUAL - Em manutencao</title>
  <meta name="description" content="Site temporariamente em manutencao." />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.44)),
        url("background_1.png") center / cover no-repeat fixed;
    }

    main {
      width: min(720px, 100%);
      text-align: center;
    }

    .brand {
      display: block;
      margin-bottom: 18px;
      font-size: 14px;
      line-height: 1;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    h1 {
      font-size: clamp(42px, 8vw, 86px);
      line-height: 0.95;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    p {
      max-width: 560px;
      margin: 22px auto 0;
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
    }
  </style>
</head>
<body>
  <main>
    <span class="brand">MED&QUAL</span>
    <h1>Em manutenção</h1>
    <p>Estamos realizando ajustes técnicos. O site voltará em breve.</p>
  </main>
</body>
</html>
